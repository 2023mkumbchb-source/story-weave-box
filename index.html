<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kenya Meds – Medical Study Platform for Kenyan Students</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1a3c34" />
    <meta name="description" content="Free medical study platform for Kenyan health students. Articles, flashcards, MCQ quizzes, and timed exams for Pathology, Pharmacology, and more. Study smarter.">
    <meta name="author" content="Abongo Davis" />
    <meta name="keywords" content="medical study, pathology, pharmacology, MCQ, flashcards, Kenya, medical students, MBChB, nursing, clinical medicine, Kenya Meds">
    <link rel="canonical" href="https://medicine.kenyaadverts.co.ke/" />

    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://medicine.kenyaadverts.co.ke/" />
    <meta property="og:title" content="Kenya Meds – Medical Study Platform">
    <meta property="og:description" content="Free articles, flashcards, MCQ quizzes, and timed exams for medical students in Kenya.">
    <meta property="og:image" content="https://medicine.kenyaadverts.co.ke/og-default.jpg">

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Kenya Meds – Medical Study Platform">
    <meta name="twitter:description" content="Free articles, flashcards, MCQ quizzes, and timed exams for medical students in Kenya.">
    <meta name="twitter:image" content="https://medicine.kenyaadverts.co.ke/og-default.jpg">

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Kenya Meds",
      "url": "https://medicine.kenyaadverts.co.ke/",
      "description": "Medical study platform for Kenyan health students with articles, flashcards, MCQs, and exams.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://medicine.kenyaadverts.co.ke/blog?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
